# GitHub Actions → Azure Web App (Python).
# Generated by Azure when you set up deployment from the portal
# (Deployment Center → GitHub) — this is a clean reference version.
#
# Prereqs:
#   1. In the Web App → Get publish profile (or use OIDC) and store it as the
#      repo secret AZUREAPPSERVICE_PUBLISHPROFILE.
#   2. Set APP_NAME below to your Web App name.
#   3. App Service → Configuration → SCM_DO_BUILD_DURING_DEPLOYMENT = true
#      (so Oryx runs `pip install -r requirements.txt` on the server).
#   4. Set the Startup Command (see startup.txt).

name: Deploy to Azure Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: chris-warrick-site      # <-- your Web App name
  PYTHON_VERSION: "3.12"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Zip artifact for deployment
        run: zip -r release.zip . -x "venv/*" ".git/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: release.zip
